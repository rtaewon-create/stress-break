<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 현생 점검하기!</title>
    <!-- 구글 폰트 시스템 연동 (주아 폰트) -->
    <link rel="stylesheet" href="https://googleapis.com">
    <style>
        :root {
            --bg-main: #55BCC2;
            --bg-light: #CDDF60;
            --accent-orange: #E05A36;
            --charcoal: #2B2726;
            --card-bg: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Jua', 'Noto Sans KR', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 아이패드 세로형 고정 규격 컨테이너 */
        .ipad-container {
            width: 100%;
            max-width: 768px;
            height: 1024px;
            background: var(--bg-main);
            color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        @media (max-height: 1024px) {
            .ipad-container {
                height: 100vh;
            }
        }

        /* 단일 스크린 프레임 정의 */
        .page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 60px 40px;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--bg-main);
        }

        .page.active {
            display: flex !important;
        }

        /* 시작하기 메인 액션 버튼 */
        .btn {
            background-color: var(--bg-light);
            color: var(--charcoal);
            font-size: 26px;
            font-weight: 700;
            padding: 20px 80px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease-out;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            outline: none;
            z-index: 5;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        /* 결과창 서브 홈이동 버튼 */
        .btn-sub {
            background-color: transparent;
            color: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 20px;
            font-weight: 700;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: -10px;
            text-align: center;
        }

        .btn-sub:active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* 메인 페이지 레이아웃 */
        #page-main {
            background: linear-gradient(135deg, #6BCFD5 0%, var(--bg-main) 100%);
            justify-content: flex-start;
            padding-top: 140px;
            gap: 45px;
        }

        /* 우측 상단 고정 공식 ER실 로고 크기 및 그림자 정의 */
        .main-top-logo-container {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 160px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
        }

        /* 사원증 그래픽 캐릭터 CSS 아트 */
        .main-graphic {
            width: 220px;
            height: 240px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .character-hair {
            position: absolute;
            top: 10px;
            width: 160px;
            height: 150px;
            background: #75CBD2;
            border-radius: 80px 80px 50px 50px;
            border: 4px solid var(--charcoal);
        }

        .character-hair-bangs {
            position: absolute;
            top: 30px;
            width: 152px;
            height: 50px;
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            z-index: 3;
        }

        .bang-chunk {
            width: 40px;
            height: 40px;
            background: #75CBD2;
            border-bottom: 4px solid var(--charcoal);
            border-right: 4px solid var(--charcoal);
            transform: rotate(45deg);
            border-radius: 0 0 15px 0;
        }

        .character-head {
            width: 130px;
            height: 120px;
            background: #FFE4D6;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            border: 4px solid var(--charcoal);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding-top: 20px;
        }

        .character-eyes {
            display: flex;
            gap: 35px;
        }

        .character-eye {
            width: 12px;
            height: 12px;
            background: var(--charcoal);
            border-radius: 50%;
        }

        .character-mouth {
            width: 16px;
            height: 12px;
            background: var(--accent-orange);
            border-radius: 0 0 15px 15px;
            border: 3px solid var(--charcoal);
            border-top: none;
        }

        .character-body {
            width: 140px;
            height: 100px;
            background: var(--bg-light);
            border-radius: 40px 40px 0 0;
            border: 4px solid var(--charcoal);
            z-index: 1;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .character-card {
            width: 26px;
            height: 38px;
            background: #fff;
            border: 3px solid var(--charcoal);
            position: absolute;
            top: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 3px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card-orange {
            width: 100%;
            height: 16px;
            background: var(--accent-orange);
            border-radius: 2px;
        }

        .main-title-box {
            text-align: center;
        }

        .main-title {
            font-size: 52px;
            font-weight: 900;
            margin-bottom: 18px;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
            word-break: keep-all;
            line-height: 1.35;
            color: #fff;
        }

        .main-subtitle {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            opacity: .9;
            max-width: 540px;
            margin: 0 auto;
            word-break: keep-all;
        }

        /* 질문 상단 바 및 홈버튼 인터페이스 */
        #page-test {
            justify-content: flex-start;
            gap: 35px;
            padding-top: 60px;
        }

        .test-top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .home-icon-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 32px;
            cursor: pointer;
            font-weight: 900;
            padding: 5px 10px;
        }

        .home-icon-btn:active {
            color: #fff;
        }

        .progress-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            margin-right: 20px;
        }

        .progress-bar-bg {
            flex-grow: 1;
            height: 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 7px;
            margin-right: 25px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 25%;
            background: var(--bg-light);
            border-radius: 7px;
            transition: width .3s ease-out;
        }

        .progress-text {
            font-size: 26px;
            font-weight: 700;
            color: var(--bg-light);
        }

        /* 질문 및 확대형 답변 리스트 프레임 (20% 가독성 업그레이드) */
        .question-box {
            width: 100%;
            text-align: left;
        }

        .question-text {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.45;
            word-break: keep-all;
        }

        .options-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }

        .option-card {
            background: var(--card-bg);
            border: 2px solid rgba(255, 255, 255, .08);
            border-radius: 24px;
            padding: 24px 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 22px;
            transition: all .2s ease;
        }

        .option-card:active {
            background: rgba(255, 255, 255, 0.22);
            transform: scale(.98);
            border-color: var(--bg-light);
        }

        .option-badge {
