<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER실과 함께하는 내 마음 점검하기!</title>
    <!-- 구글 폰트 불러오기 -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-main: #55BCC2;
            --bg-light: #CDDF60;
            --accent-orange: #E05A36;
            --charcoal: #2B2726;
            --card-bg: rgba(255, 255, 255, 0.12);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Jua', 'Noto Sans KR', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .ipad-container {
            width: 100%;
            max-width: 768px;
            height: 1024px;
            background: var(--bg-main);
            color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,.15);
        }
        @media(max-height: 1024px) {
            .ipad-container { height: 100vh; }
        }
        .page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 60px 40px;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--bg-main);
        }
        .page.active {
            display: flex !important;
        }
        .btn {
            background-color: var(--bg-light);
            color: var(--charcoal);
            font-size: 26px;
            font-weight: 700;
            padding: 20px 80px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,.1);
            transition: all .2s ease-out;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            outline: none;
            z-index: 5;
        }
        .btn:active {
            transform: scale(.95);
            box-shadow: 0 5px 10px rgba(0,0,0,.1);
        }
        #page-main {
            background: linear-gradient(135deg, #6BCFD5 0%, var(--bg-main) 100%);
            justify-content: flex-start;
            padding-top: 140px;
            gap: 45px;
        }
        .main-graphic {
            width: 220px;
            height: 240px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 10px;
        }
        .character-hair {
            position: absolute;
            top: 10px;
            width: 160px;
            height: 150px;
            background: #75CBD2;
            border-radius: 80px 80px 50px 50px;
            border: 4px solid var(--charcoal);
        }
        .character-hair-bangs {
            position: absolute;
            top: 30px;
            width: 152px;
            height: 50px;
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            z-index: 3;
        }
        .bang-chunk {
            width: 40px;
            height: 40px;
            background: #75CBD2;
            border-bottom: 4px solid var(--charcoal);
            border-right: 4px solid var(--charcoal);
            transform: rotate(45deg);
            border-radius: 0 0 15px 0;
        }
        .character-head {
            width: 130px;
            height: 120px;
            background: #FFE4D6;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            border: 4px solid var(--charcoal);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding-top: 20px;
        }
        .character-eyes { display: flex; gap: 35px; }
        .character-eye { width: 12px; height: 12px; background: var(--charcoal); border-radius: 50%; }
        .character-mouth {
            width: 16px;
            height: 12px;
            background: var(--accent-orange);
            border-radius: 0 0 15px 15px;
            border: 3px solid var(--charcoal);
            border-top: none;
        }
        .character-body {
            width: 140px;
            height: 100px;
            background: var(--bg-light);
            border-radius: 40px 40px 0 0;
            border: 4px solid var(--charcoal);
            z-index: 1;
            position: relative;
            display: flex;
            justify-content: center;
        }
        .character-card {
            width: 26px;
            height: 38px;
            background: #fff;
            border: 3px solid var(--charcoal);
            position: absolute;
            top: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 3px;
            box-shadow: 0 4px 6px rgba(0,0,0,.1);
        }
        .card-orange { width: 100%; height: 16px; background: var(--accent-orange); border-radius: 2px; }
        .main-title-box { text-align: center; }
        .main-title {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 18px;
            letter-spacing: -.5px;
            text-shadow: 0 4px 12px rgba(0,0,0,.15);
            word-break: keep-all;
            line-height: 1.35;
            color: #fff;
        }
        .main-subtitle {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            opacity: .9;
            max-width: 540px;
            margin: 0 auto;
            word-break: keep-all;
        }
        .main-bottom-logo { width: 240px; height: auto; margin-top: auto; margin-bottom: 10px; opacity: .85; }
        #page-test { justify-content: flex-start; gap: 35px; padding-top: 60px; }
        .test-top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .home-icon-btn { background: none; border: none; color: rgba(255,255,255,.5); font-size: 32px; cursor: pointer; font-weight: 700; padding: 5px 10px; }
        .progress-container { flex-grow: 1; display: flex; align-items: center; margin-right: 20px; }
        .progress-bar-bg { flex-grow: 1; height: 14px; background: rgba(255,255,255,.2); border-radius: 7px; margin-right: 25px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--bg-light); border-radius: 7px; transition: width .3s ease-out; }
        .progress-text { font-size: 26px; font-weight: 700; color: var(--bg-light); }
        .question-box { width: 100%; text-align: left; }
        .question-text { font-size: 36px; font-weight: 700; line-height: 1.45; word-break: keep-all; }
        .options-container { width: 100%; display: flex; flex-direction: column; gap: 20px; margin-top: 15px; }
        .option-card {
            background: var(--card-bg);
            border: 2px solid rgba(255,255,255,.08);
            border-radius: 24px;
            padding: 24px 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 22px;
            transition: all .2s ease;
        }
        .option-card:active {
            background: rgba(255,255,255,.22);
            transform: scale(.98);
            border-color: var(--bg-light);
        }
        .option-badge {
            width: 44px;
            height: 44px;
            background: var(--bg-light);
            color: var(--charcoal);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .option-contents { font-size: 24px; font-weight: 700; line-height: 1.45; word-break: keep-all; }
        .loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 10; flex-direction: column; justify-content: center; align-items: center; gap: 35px; }
        .circle-progress-box { position: relative; width: 220px; height: 220px; }
        .circle-svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(255,255,255,.15); stroke-width: 14; }
        .circle-fill { fill: none; stroke: var(--bg-light); stroke-width: 14; stroke-dasharray: 565.48; stroke-dashoffset: 565.48; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
        .loading-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 56px; font-weight: 700; color: var(--bg-light); }
        .loading-text { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
        .result-popup { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: var(--charcoal); z-index: 20; padding: 60px 40px; flex-direction: column; justify-content: space-between; align-items: center; }
        .result-header { text-align: center; width: 100%; }
        .result-tag { background: var(--accent-orange); color: #fff; padding: 8px 26px; border-radius: 30px; font-size: 20px; font-weight: 700; display: inline-block; margin-bottom: 20px; }
        .result-title { font-size: 42px; font-weight: 700; color: var(--bg-main); line-height: 1.35; word-break: keep-all; }
.result-body { background: #f5faf9; border-radius: 28px; padding: 35px 30px; width: 100%; box-shadow: inset 0 2px 10px rgba(0,0,0,.03); margin: 20px 0; }.info-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: var(--accent-orange); display: flex; align-items: center; gap: 8px; }.info-desc { font-size: 22px; line-height: 1.65; margin-bottom: 35px; word-break: keep-all; color: #334155; font-weight: 500; }.program-popup { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-light); color: var(--charcoal); z-index: 30; padding: 60px 40px; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 40px; }.program-top-content { display: flex; flex-direction: column; align-items: center; gap: 30px; }.program-zone-badge { background: #fff; color: var(--bg-main); font-size: 28px; font-weight: 700; padding: 16px 45px; border-radius: 24px; box-shadow: 0 12px 25px rgba(0,0,0,.08); }.program-desc { font-size: 34px; font-weight: 700; line-height: 1.65; max-width: 580px; word-break: keep-all; color: var(--charcoal); }.btn-white-back { background: #fff; color: var(--bg-main); }ER실과 함께하는내 마음 점검하기!당신의 현재 마음의 상태를 체크하고 그에 맞는 재밌는 처방을 내려드립니다!시작하기🏠1/3질문이 로딩 중입니다...0%마음 진단 분석표를 뽑는 중...진단 결과마음 상태 결과💡 상태 요약상세 내용이 여기에 표시됩니다.나에게 맞는 처방 보기💊 처방 프로그램추천 힐링 프로그램 안내처음으로 돌아가기var GOOGLE_WEB_APP_URL = "여기에_구글_웹앱_주소를_넣으세요";// 데이터베이스: 질문 리스트와 객관식 카드 내용const questions = [{q: "요즘 스트레스를 받을 때 당신의 가장 두드러진 내면 상태는?",options: ["아무것도 하기 싫고 무기력해진다.","주변 사람들에게 예민해지거나 짜증이 자주 난다.","음식을 폭식하거나 무조건 잠만 자려고 한다."]},{q: "현재 내 마음의 배터리 잔량을 직관적으로 표현한다면?",options: ["10% 미만 - 당장 모든 걸 멈추고 쉬어야 하는 완전 방전 상태","50% - 지치긴 했지만 꾸역꾸역 버틸 만한 아슬아슬한 상태","80% 이상 - 아직은 에너지가 충분하고 건강한 평온 상태"]},{q: "가장 온전한 휴식을 줄 것 같은 이번 주말의 풍경은?",options: ["조용한 방 안에서 아무 방해 없이 혼자 짱박혀 뒹굴거리기","탁 트인 자연이나 한적하고 예쁜 카페로 무작정 떠나기","친한 친구들을 만나 맛있는 음식을 먹으며 폭풍 수다 떨기"]}];let currentIdx = 0;let scores =;function startTest() {currentIdx = 0;scores =;document.getElementById('page-main').classList.remove('active');document.getElementById('page-test').classList.add('active');showQuestion();}function showQuestion() {const qData = questions[currentIdx];document.getElementById('question-text').innerText = Q${currentIdx + 1}. ${qData.q};const progressPercent = ((currentIdx + 1) / questions.length) * 100;document.getElementById('progress-fill').style.width = ${progressPercent}%;document.getElementById('progress-text').innerText = ${currentIdx + 1}/${questions.length};const optionsBox = document.getElementById('options-box');optionsBox.innerHTML = "";const badges = ['A', 'B', 'C'];qData.options.forEach((opt, index) => {const card = document.createElement('div');card.className = 'option-card';card.onclick = () => selectOption(index);card.innerHTML = <div class="option-badge">${badges[index]}</div> <div class="option-contents">${opt}</div>;optionsBox.appendChild(card);});}function selectOption(optIdx) {scores[optIdx]++;if (currentIdx < questions.length - 1) {currentIdx++;showQuestion();} else {runLoading();}}function runLoading() {document.getElementById('page-test').classList.remove('active');document.getElementById('page-loading').style.display = 'flex';let count = 0;const circle = document.getElementById('loading-circle');const totalDash = 565.48;const interval = setInterval(() => {count += 2;document.getElementById('loading-number').innerText = ${count}%;const offset = totalDash - (totalDash * count / 100);circle.style.strokeDashoffset = offset;if (count >= 100) {clearInterval(interval);document.getElementById('page-loading').style.display = 'none';showResult();}}, 30);}function showResult() {let maxIdx = scores.indexOf(Math.max(...scores));let title = "";let desc = "";let program = "";if (maxIdx === 0) {title = "에너지 방전, 퓨즈 오프 상태";desc = "현재 심신이 무척 고갈된 번아웃 상태에 매우 가깝습니다. 만사가 귀찮고 무기력하게 느껴지는 것은 에너지가 바닥났으니 즉시 가동을 멈추라는 감정 엔진의 비상경보 시스템입니다.";program = "[정서적 절대 휴식 케어]\n오늘만큼은 알람을 모두 끄고 최소 7시간 이상의 아늑한 숙면과 따뜻한 차 한 잔으로 타인과 단절된 나만의 정적 아지트 타임을 확보하세요.";} else if (maxIdx === 1) {title = "과부하 경고등 임계점 상태";desc = "스트레스 감정 수치가 아슬아슬하게 차올라 주변의 아주 작은 자극이나 대화에도 방어적이고 날카로워지기 쉬운 감정 과부하 상태입니다. 즉각적인 외부 환기가 요구됩니다.";program = "[스트레스 분출 카타르시스]\n답답한 실내 공간을 전적으로 벗어나 공기가 탁 트인 거리를 가볍게 산책하거나, 드라이브를 하며 빠른 비트의 음악을 들어 감정을 바깥으로 분산시키는 환기 요법을 추천합니다.";} else {title = "보상 심리 엔진 과열 상태";desc = "스트레스를 매운 음식 폭식, 혹은 충동적인 소비나 과도한 도피성 수면 등 즉각적인 쾌락 보상 기전으로 해결하려는 성향이 지배적인 상태입니다. 장기적으로 생체 리듬을 무너뜨릴 수 있습니다.";program = "[오감 리프레시 밸런싱 테라피]\n자극적인 가공식품 대신 가벼운 클린 푸드를 섭취하고, 미지근한 물로 샤워를 마친 뒤 잔잔한 뉴에이지 음악과 스트레칭을 통해 흐트러진 내면의 리듬 규칙성을 되찾아 보세요.";}document.getElementById('result-title').innerText = title;document.getElementById('result-desc').innerText = desc;document.getElementById('program-desc').innerText = program;document.getElementById('popup-result').style.display = 'flex';if(GOOGLE_WEB_APP_URL && GOOGLE_WEB_APP_URL !== "여기에_구글_웹앱_주소를_넣으세요") {fetch(GOOGLE_WEB_APP_URL, {method: 'POST',mode: 'no-cors',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ resultTitle: title, timestamp: new Date().toLocaleString() })}).catch(e => console.log(e));}}function showProgram() {document.getElementById('popup-result').style.display = 'none';document.getElementById('popup-program').style.display = 'flex';}function goHome() {document.getElementById('popup-result').style.display = 'none';document.getElementById('popup-program').style.display = 'none';document.getElementById('page-test').classList.remove('active');document.getElementById('page-main').classList.add('active');}
