        :root {
            --bg-main: #55BCC2;
            --bg-light: #CDDF60;
            --accent-orange: #E05A36;
            --charcoal: #2B2726;
            --card-bg: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Jua', 'Noto Sans KR', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 아이패드 세로형 고정 규격 컨테이너 */
        .ipad-container {
            width: 100%;
            max-width: 768px;
            height: 1024px;
            background: var(--bg-main);
            color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        @media (max-height: 1024px) {
            .ipad-container {
                height: 100vh;
            }
        }

        /* 단일 스크린 프레임 정의 */
        .page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 60px 40px;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--bg-main);
        }

        .page.active {
            display: flex !important;
        }

        /* 시작하기 메인 액션 버튼 */
        .btn {
            background-color: var(--bg-light);
            color: var(--charcoal);
            font-size: 26px;
            font-weight: 700;
            padding: 20px 80px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease-out;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            outline: none;
            z-index: 5;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }

        /* 결과창 서브 홈이동 버튼 */
        .btn-sub {
            background-color: transparent;
            color: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 20px;
            font-weight: 700;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: -10px;
            text-align: center;
        }

        .btn-sub:active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* 메인 페이지 레이아웃 */
        #page-main {
            background: linear-gradient(135deg, #6BCFD5 0%, var(--bg-main) 100%);
            justify-content: flex-start;
            padding-top: 140px;
            gap: 45px;
        }

        /* 우측 상단 고정 공식 ER실 로고 크기 및 그림자 정의 */
        .main-top-logo-container {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 160px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
        }

        /* 사원증 그래픽 캐릭터 CSS 아트 */
        .main-graphic {
            width: 220px;
            height: 240px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .character-hair {
            position: absolute;
            top: 10px;
            width: 160px;
            height: 150px;
            background: #75CBD2;
            border-radius: 80px 80px 50px 50px;
            border: 4px solid var(--charcoal);
        }

        .character-hair-bangs {
            position: absolute;
            top: 30px;
            width: 152px;
            height: 50px;
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            z-index: 3;
        }

        .bang-chunk {
            width: 40px;
            height: 40px;
            background: #75CBD2;
            border-bottom: 4px solid var(--charcoal);
            border-right: 4px solid var(--charcoal);
            transform: rotate(45deg);
            border-radius: 0 0 15px 0;
        }

        .character-head {
            width: 130px;
            height: 120px;
            background: #FFE4D6;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            border: 4px solid var(--charcoal);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding-top: 20px;
        }

        .character-eyes {
            display: flex;
            gap: 35px;
        }

        .character-eye {
            width: 12px;
            height: 12px;
            background: var(--charcoal);
            border-radius: 50%;
        }

        .character-mouth {
            width: 16px;
            height: 12px;
            background: var(--accent-orange);
            border-radius: 0 0 15px 15px;
            border: 3px solid var(--charcoal);
            border-top: none;
        }

        .character-body {
            width: 140px;
            height: 100px;
            background: var(--bg-light);
            border-radius: 40px 40px 0 0;
            border: 4px solid var(--charcoal);
            z-index: 1;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .character-card {
            width: 26px;
            height: 38px;
            background: #fff;
            border: 3px solid var(--charcoal);
            position: absolute;
            top: 20px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 3px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card-orange {
            width: 100%;
            height: 16px;
            background: var(--accent-orange);
            border-radius: 2px;
        }

        .main-title-box {
            text-align: center;
        }

        .main-title {
            font-size: 52px;
            font-weight: 900;
            margin-bottom: 18px;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
            word-break: keep-all;
            line-height: 1.35;
            color: #fff;
        }

        .main-subtitle {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.6;
            opacity: .9;
            max-width: 540px;
            margin: 0 auto;
            word-break: keep-all;
        }

        /* 질문 상단 바 및 홈버튼 인터페이스 */
        #page-test {
            justify-content: flex-start;
            gap: 35px;
            padding-top: 60px;
        }

        .test-top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .home-icon-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 32px;
            cursor: pointer;
            font-weight: 900;
            padding: 5px 10px;
        }

        .home-icon-btn:active {
            color: #fff;
        }

        .progress-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            margin-right: 20px;
        }

        .progress-bar-bg {
            flex-grow: 1;
            height: 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 7px;
            margin-right: 25px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 25%;
            background: var(--bg-light);
            border-radius: 7px;
            transition: width .3s ease-out;
        }

        .progress-text {
            font-size: 26px;
            font-weight: 700;
            color: var(--bg-light);
        }

        }

        .options-container {

        .option-card {

let currentStep = 0;
let selectedAnswers = [];
function startTest() {
currentStep = 0;
selectedAnswers = [];
document.getElementById("page-main").classList.remove("active");
document.getElementById("page-test").classList.add("active");
renderQuestion();
}
function goToHome() {
window.location.reload();
}
function renderQuestion() {
const e = questions[currentStep];
document.getElementById("progress-fill").style.width = ((currentStep + 1) / 4 * 100) + "%";
document.getElementById("progress-text").innerText = ${currentStep + 1} / 4;
document.getElementById("question-html").innerText = e.q;
const t = document.getElementById("options-html");
t.innerHTML = "";
e.options.forEach(e => {
const n = document.createElement("div");
n.className = "option-card";
n.onclick = () => selectOption(e.key);
n.innerHTML = <div class="option-badge">${e.key}</div><div class="option-contents">${e.text}</div>;
t.appendChild(n);
});
}
function selectOption(e) {
selectedAnswers.push(e);
if (currentStep < 3) {
currentStep++;
renderQuestion();
} else {
runLoadingAnimation();
}
}
function runLoadingAnimation() {
const e = document.getElementById("loading-layer");
const t = document.getElementById("loading-num");
const n = document.getElementById("circle-fill-bar");
e.style.display = "flex";
let c = 0;
const o = setInterval(() => {
c++;
t.innerText = c + "%";
const a = 565.48 - (c / 100 * 565.48);
n.style.strokeDashoffset = a;
if (c >= 100) {
clearInterval(o);
setTimeout(() => {
e.style.display = "none";
calculateAndShowResult();
}, 400);
}
}, 16);
}
function calculateAndShowResult() {
const e = { A: 0, B: 0, C: 0, D: 0 };
selectedAnswers.forEach(t => e[t]++);
let t = 0;
let n = "";
let c = [];
for (let o in e) {
if (e[o] > t) {
t = e[o];
c = [o];
} else if (e[o] === t) {
c.push(o);
}
}
n = c.length > 1 ? selectedAnswers : c;
// 노트북 실시간 전송 함수 호출
sendDataToGoogle(selectedAnswers, n);
const o = resultsMap[n];
document.getElementById("result-type-title").innerText = o.title;
document.getElementById("result-analysis").innerText = o.analysis;
document.getElementById("result-prescription").innerText = o.prescription;
document.getElementById("result-layer").style.display = "flex";
}
// 노트북 원격 원치 실시간 포스팅 코어 모듈
function sendDataToGoogle(answers, finalType) {
if (!GOOGLE_WEB_APP_URL || GOOGLE_WEB_APP_URL.indexOf("여기에") === 0) return;
var payload = {
q1: answers,
q2: answers,
q3: answers,
q4: answers,
type: resultsMap[finalType].title
};
fetch(GOOGLE_WEB_APP_URL, {
method: "POST",
mode: "no-cors",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(payload)
}).catch(err => console.error("데이터 전송 에러:", err));
}
function showProgram() {
const e = { A: 0, B: 0, C: 0, D: 0 };
selectedAnswers.forEach(t => e[t]++);
let t = 0;
let n = "";
let c = [];
for (let o in e) {
if (e[o] > t) { t = e[o]; c = [o]; }
else if (e[o] === t) { c.push(o); }
}
n = c.length > 1 ? selectedAnswers : c;
const o = resultsMap[n];
document.getElementById("program-zone").innerText = o.zone;
document.getElementById("program-desc").innerHTML = o.desc;
document.getElementById("program-layer").style.display = "flex";
}
function resetToMain() {
document.getElementById("program-layer").style.display = "none";
document.getElementById("result-layer").style.display = "none";
document.getElementById("page-test").classList.remove("active");
window.location.reload();
}
